# A generic, single database configuration.

[alembic]
script_location = /app/tools/alembic


file_template = %%(epoch)s_%%(rev)s_%%(slug)s

prepend_sys_path = .

timezone = UTC

version_path_separator = os  # Use os.pathsep. Default configuration used for new projects.

[post_write_hooks]
hooks = ruff_lint, ruff_format
ruff_lint.type = exec
ruff_lint.executable = ruff
ruff_lint.options = check --fix REVISION_SCRIPT_FILENAME --unsafe-fixes -s

ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME -s

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
